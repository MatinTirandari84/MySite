<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>یک روز خاص</title>
    
    <!-- استفاده از Tailwind CSS برای استایل‌دهی سریع و مدرن -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- تنظیم فونت زیبای لاله زار و وزیرمتن برای فارسی -->
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.0.0/Vazirmatn-font-face.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&display=swap" rel="stylesheet">

    <!-- اضافه کردن کتابخانه Confetti برای افکت کاغذ رنگی -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body {
            /* ارتفاع زیاد برای ایجاد فضای اسکرول (5 برابر ارتفاع صفحه) */
            height: 500vh;
            background-color: #000;
            font-family: 'Vazirmatn', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* استایل‌های مربوط به بوم نقاشی (Canvas) که ویدیو را پخش می‌کند */
        #video-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* این دستور باعث می‌شود ویدیو در هر رزولوشنی (موبایل یا سیستم) کامل و بدون دفورمگی فیت شود */
            object-fit: cover; 
            z-index: 1;
            /* شفافیت کامل برای نمایش با نهایت کیفیت */
            opacity: 1; 
            image-rendering: high-quality; /* اجبار مرورگر به رندر با بالاترین کیفیت */
        }

        /* صفحه لودینگ اولیه */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.8s ease;
            padding: 20px;
            text-align: center;
        }

        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* فونت خاص برای تیتر تبریک */
        .font-lalezar {
            font-family: 'Lalezar', cursive;
        }
    </style>
</head>
<body class="antialiased text-white">

    <!-- صفحه بارگذاری -->
    <div id="loading-screen">
        <div class="loader mb-4" id="loader-spinner"></div>
        <h2 class="text-xl font-bold" id="loading-title">در حال آماده‌سازی سوپرایز...</h2>
        <p id="loading-progress" class="text-sm text-gray-400 mt-4 leading-relaxed">0%</p>
    </div>

    <!-- بوم رندر ویدیو با کیفیت اصلی -->
    <canvas id="video-canvas"></canvas>

    <!-- افکت تبریک اولیه (بدون دکمه و نوشته‌های اضافی) -->
    <div id="greeting-overlay" class="fixed inset-0 z-20 flex flex-col items-center justify-center pointer-events-none transition-opacity duration-1000">
        
        <h1 class="text-6xl md:text-8xl font-lalezar text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.7)] tracking-wider mb-2 animate-pulse">
            فکر کردی یادم رفته 😁
        </h1>
        <p class="text-2xl md:text-4xl font-bold text-gray-100 drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] opacity-90">
           مبارک باشه روزت 
        </p>

        <!-- آیکون راهنمای اسکرول -->
        <div class="absolute bottom-10 flex flex-col items-center opacity-80 animate-bounce">
            <span class="text-sm font-bold drop-shadow-md mb-2">برای مشاهده اسکرول کنید</span>
            <svg class="w-6 h-6 text-white drop-shadow-md" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
            </svg>
        </div>

    </div>

    <script>
        // === تنظیمات اصلی ===
        const canvas = document.getElementById("video-canvas");
        const context = canvas.getContext("2d");
        const loadingScreen = document.getElementById("loading-screen");
        const loadingProgress = document.getElementById("loading-progress");
        const loaderSpinner = document.getElementById("loader-spinner");
        const loadingTitle = document.getElementById("loading-title");
        const greetingOverlay = document.getElementById("greeting-overlay");
        
        const frameCount = 240; // تعداد فریم‌های شما
        const images = [];      // آرایه‌ای برای ذخیره عکس‌ها در RAM
        
        let loadedImages = 0;   // شمارنده عکس‌های موفق
        let processedCount = 0; // شمارنده کل تلاش‌ها (موفق و ناموفق)
        let firstFailedPath = ""; // نگهداری مسیر اولین خطای پیش‌آمده

        // تابع تولید مسیر عکس
        const currentFrame = index => (
            `./frames/frame_${index.toString().padStart(4, '0')}.webp`
        );

        // === تابع شلیک کاغذ رنگی (Confetti) ===
        function shootConfetti() {
            var duration = 3000; // مدت زمان پرتاب به میلی‌ثانیه (3 ثانیه)
            var end = Date.now() + duration;

            (function frame() {
                // پرتاب از سمت چپ
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff']
                });
                // پرتاب از سمت راست
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        // === تابع چک کردن پیشرفت لودینگ ===
        function checkProgress() {
            processedCount++;
            const progress = Math.round((processedCount / frameCount) * 100);
            
            if (loadingProgress.dataset.error !== "true") {
                loadingProgress.innerText = `${progress}%`;
            }

            if (processedCount === frameCount) {
                if (loadedImages === 0) {
                    loadingProgress.dataset.error = "true";
                    loaderSpinner.style.display = "none";
                    loadingTitle.innerText = "خطا: عکس‌ها در مسیر پیدا نشدند!";
                    loadingTitle.classList.add("text-red-500");
                    
                    loadingProgress.innerHTML = `
                        مرورگر نتوانست فایل عکس را پیدا کند. <br>
                        لطفاً مسیر دقیق زیر را بررسی کنید:<br><br>
                        <span class="text-xs text-yellow-400 font-mono bg-gray-900 p-2 rounded block" dir="ltr">
                            ${firstFailedPath}
                        </span>
                    `;
                    loadingProgress.classList.remove("text-gray-400");
                    loadingProgress.classList.add("text-white");
                } else {
                    loadingScreen.style.opacity = '0';
                    setTimeout(() => {
                        loadingScreen.style.display = 'none';
                        // اجرای افکت کاغذ رنگی بلافاصله پس از محو شدن صفحه لودینگ
                        shootConfetti(); 
                    }, 800);
                }
            }
        }

        // === پیش‌بارگذاری هوشمند ===
        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.src = currentFrame(i);
            
            img.onload = () => {
                images[i] = img; 
                loadedImages++;
                
                if (loadedImages === 1) {
                    // تنظیم ابعاد Canvas دقیقاً مطابق با رزولوشن اصلی عکس برای جلوگیری از افت کیفیت
                    canvas.width = img.naturalWidth || img.width;
                    canvas.height = img.naturalHeight || img.height;
                    context.drawImage(img, 0, 0, canvas.width, canvas.height);
                }
                
                checkProgress();
            };

            img.onerror = () => {
                if (!firstFailedPath) firstFailedPath = img.src;
                checkProgress(); 
            };
        }

        // === هسته انیمیشن با اسکرول ===
        let ticking = false;

        window.addEventListener('scroll', () => {
            // محو کردن افکت تبریک وقتی کاربر شروع به اسکرول می‌کند
            if (window.scrollY > 50) {
                greetingOverlay.style.opacity = '0';
            } else {
                greetingOverlay.style.opacity = '1';
            }

            if (!ticking) {
                window.requestAnimationFrame(() => {
                    updateImageByScroll();
                    ticking = false;
                });
                ticking = true;
            }
        });

        function updateImageByScroll() {
            if(loadedImages === 0) return;

            const scrollTop = document.documentElement.scrollTop;
            const maxScrollTop = document.documentElement.scrollHeight - window.innerHeight;
            const scrollFraction = scrollTop / maxScrollTop;

            const frameIndex = Math.min(
                frameCount,
                Math.ceil(scrollFraction * frameCount)
            );

            if (images[frameIndex]) {
                // رسم تصویر با ابعاد اصلی روی بوم
                context.drawImage(images[frameIndex], 0, 0, canvas.width, canvas.height);
            }
        }
    </script>
</body>
</html>
